            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="24" 
                height="24" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className} 
                {...props}
            >
                {children}
            </svg>
        );

        const Search = (props) => (
            <IconBase {...props}>
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
            </IconBase>
        );

        const ExternalLink = (props) => (
            <IconBase {...props}>
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                <polyline points="15 3 21 3 21 9" />
                <line x1="10" x2="21" y1="14" y2="3" />
            </IconBase>
        );

            <IconBase {...props}>
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
            </IconBase>
        );

        const Check = (props) => (
            <IconBase {...props}>
                <polyline points="20 6 9 17 4 12" />
            </IconBase>
        );

        const X = (props) => (
            <IconBase {...props}>
                <path d="M18 6 6 18" />
                <path d="m6 6 18 18" />
            </IconBase>
        );

        const { useState, useEffect } = React;

        const App = () => {
            const [selectedCategory, setSelectedCategory] = useState("הכל");
            const [searchQuery, setSearchQuery] = useState("");
            const [copiedIndex, setCopiedIndex] = useState(null);
            
            // סינון הנתונים
            const filteredData = portfolioData.filter(item => {
                const matchesCategory = selectedCategory === "הכל" || item.category === selectedCategory;
                const matchesSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      item.category.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            const handleCopy = (url, index) => {
                navigator.clipboard.writeText(url);
                setCopiedIndex(index);
                setTimeout(() => setCopiedIndex(null), 2000);
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* Header Section */}
                    {/* INCREASED padding-bottom (pb-12) to make room for the floating search bar */}
                    <header className="bg-primary text-white shadow-lg relative pb-12">
                        <div className="max-w-7xl mx-auto px-4 pt-6 pb-2">
                            <h1 className="text-2xl md:text-3xl font-bold text-center mb-1">קטלוג תוצרים ופרויקטים</h1>
                            <p className="text-center text-primaryLight text-opacity-90 text-xs md:text-sm">מאגר דינמי של לומדות, כלים טכנולוגיים ומשאבי הדרכה</p>
                        </div>
                    </header>

                    {/* Controls Section */}
                    {/* Negative margin pulls it up, but header pb-12 ensures no text overlap */}
                    <div className="max-w-7xl mx-auto px-4 -mt-8 relative z-10">
                        <div className="bg-white rounded-lg shadow-md p-4 mb-6">
                            
                            {/* Search */}
                            <div className="relative mb-3">
                                <div className="absolute right-3 top-2.5 text-gray-400 pointer-events-none">
                                    <Search className="w-4 h-4" />
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="חיפוש פרויקט, כלי או מילת מפתח..." 
                                    className="w-full pr-9 pl-4 py-1.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>

                            {/* Categories - Desktop */}
                            <div className="hidden md:flex flex-wrap gap-2 justify-center">
                                {categories.map(cat => (
                                    <button
                                        key={cat}
                                        onClick={() => setSelectedCategory(cat)}
                                        className={`px-3 py-1 rounded-full text-xs font-medium transition-all duration-200 
                                            ${selectedCategory === cat 
                                                ? 'bg-primary text-white shadow-sm' 
                                                : 'bg-gray-100 text-gray-600 hover:bg-gray-200 hover:text-gray-800'
                                            }`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>

                            {/* Categories - Mobile Dropdown */}
                            <div className="md:hidden">
                                <label className="text-xs font-semibold text-gray-500 mb-1 block">סינון לפי קטגוריה:</label>
                                <select 
                                    value={selectedCategory}
                                    onChange={(e) => setSelectedCategory(e.target.value)}
                                    className="w-full p-2 text-sm bg-gray-50 border border-gray-200 rounded-lg text-gray-700"
                                >
                                    {categories.map(cat => (
                                        <option key={cat} value={cat}>{cat}</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                    </div>

                    {/* Results Grid */}
                    <main className="max-w-[90%] mx-auto px-2">
                        <div className="flex justify-between items-center mb-3 text-gray-500 text-xs md:text-sm">
                            <span>מציג {filteredData.length} תוצאות</span>
                            {(searchQuery || selectedCategory !== "הכל") && (
                                <button 
                                    onClick={() => {setSearchQuery(""); setSelectedCategory("הכל");}}
                                    className="text-primary hover:text-primaryDark flex items-center gap-1"
                                >
                                    <X className="w-3 h-3" />
                                    נקה סינון
                                </button>
                            )}
                        </div>

                        {filteredData.length === 0 ? (
                            <div className="text-center py-16 bg-white rounded-xl shadow-sm border border-gray-100">
                                <div className="text-gray-400 mb-3 flex justify-center"><Search className="w-10 h-10" /></div>
                                <h3 className="text-lg font-medium text-gray-600">לא נמצאו תוצאות</h3>
                                <p className="text-gray-400 mt-1 text-sm">נסה לשנות את מילות החיפוש או הקטגוריה</p>
                            </div>
                        ) : (
                            // Grid: Increased density for desktop (xl:grid-cols-5)
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
                                {filteredData.map((item, index) => (
                                    // Card: Reduced padding
                                    <div key={index} className="bg-white rounded-lg shadow-sm border border-gray-100 p-3 card-hover transition-all duration-300 flex flex-col justify-between h-full">
                                        <div>
                                            <div className="flex justify-between items-start mb-1.5">
                                                <span className="inline-block px-2 py-0.5 bg-primaryLight text-primary text-[10px] md:text-xs font-bold rounded">
                                                    {item.category}
                                                </span>
                                            </div>
                                            {/* Compact Title */}
                                            <h3 className="text-sm font-bold text-gray-800 leading-snug mb-1 min-h-[2rem]">
                                                {item.title}
                                            </h3>
                                        </div>
                                        
                                        {/* Ultra Compact Footer & Button */}
                                        <div className="mt-2 pt-2 border-t border-gray-50 flex gap-2">
                                            <a 
                                                href={item.url} 
                                                target="_blank" 
                                                rel="noopener noreferrer"
                                                className="flex-1 bg-primary text-white py-1 px-2 rounded font-medium text-xs text-center hover:bg-primaryDark transition-colors flex items-center justify-center gap-1.5 group"
                                            >
                                                פתח
                                                <ExternalLink className="w-3 h-3 group-hover:translate-x-[-2px] transition-transform" />
                                            </a>
                                            
                                            <button 
                                                onClick={() => handleCopy(item.url, index)}
                                                className={`p-1 rounded border transition-all duration-200 ${
                                                    copiedIndex === index 
                                                    ? 'bg-green-50 border-green-200 text-green-600' 
                                                    : 'bg-white border-gray-200 text-gray-400 hover:bg-gray-50 hover:text-gray-600'
                                                }`}
                                                title="העתק קישור"
                                            >
                                                {copiedIndex === index ? <Check className="w-3.5 h-3.5" /> : <Copy className="w-3.5 h-3.5" />}
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    
                    <footer className="mt-8 text-center text-gray-400 text-xs pb-6">
                        <p>© {new Date().getFullYear()} קטלוג תוצרים דיגיטליים</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
