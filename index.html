                } catch (err) {

                }

                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-primary to-primaryDark text-white shadow-soft relative pb-20 pt-10 md:pt-14 overflow-hidden">
                        {/* דוגמת רקע עדינה בכותרת */}
                        <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundImage: 'radial-gradient(circle at 2px 2px, white 1px, transparent 0)', backgroundSize: '24px 24px'}}></div>
                        <div className="max-w-7xl mx-auto px-4 relative z-10">
                            <h1 className="text-4xl md:text-6xl font-extrabold text-center mb-4 tracking-tight">קטלוג פרויקטים</h1>
                            <p className="text-center text-primaryLight text-opacity-95 text-lg md:text-xl font-medium tracking-wide max-w-2xl mx-auto">
                                לומדות, כלים טכנולוגיים ומשאבי הדרכה
                            </p>
                        </div>
                    </header>

                    {/* חלונית חיפוש צפה (Glassmorphism) */}
                    <div className="max-w-7xl mx-auto px-4 -mt-12 relative z-20 mb-12">
                        <div className="glass-panel rounded-2xl p-5 md:p-8">
                            
                            {/* Search */}
                            <div className="relative mb-6">
                                <label htmlFor="search-catalog" className="sr-only">חיפוש בקטלוג</label>
                                <div className="absolute right-4 top-3.5 text-gray-400 pointer-events-none">
                                    <SearchIcon className="w-6 h-6 opacity-80" />
                                </div>
                                <input 
                                    id="search-catalog"
                                    type="text" 
                                    placeholder="חיפוש פרויקט, כלי או מילת מפתח..." 
                                    className="w-full pr-12 pl-4 py-3 text-base md:text-lg border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-primary/20 focus:border-primary transition-all shadow-sm bg-white/90 text-gray-800 placeholder-gray-400"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>

                            {/* Categories - Desktop */}
                            <div className="hidden md:flex flex-wrap gap-3 justify-center">
                                {categories.map(cat => (
                                    <button
                                        key={cat}
                                        onClick={() => setSelectedCategory(cat)}
                                        className={`px-6 py-2.5 rounded-full text-sm font-bold transition-all duration-300 transform border
                                            ${selectedCategory === cat 
                                                ? 'bg-primary border-primary text-white shadow-md scale-105' 
                                                : 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50 hover:shadow-sm hover:border-gray-300 hover:text-gray-900'
                                            } focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>

                            {/* Categories - Mobile */}
                            <div className="md:hidden">
                                <label htmlFor="category-select" className="text-sm font-bold text-gray-700 mb-2 block mr-1">סינון לפי קטגוריה:</label>
                                <div className="relative">
                                    <select 
                                        id="category-select"
                                        value={selectedCategory}
                                        onChange={(e) => setSelectedCategory(e.target.value)}
                                        className="w-full p-3.5 text-base bg-white border border-gray-200 rounded-xl text-gray-800 appearance-none focus:ring-4 focus:ring-primary/20 focus:border-primary outline-none font-medium shadow-sm"
                                    >
                                        {categories.map(cat => (
                                            <option key={cat} value={cat}>{cat}</option>
                                        ))}
                                    </select>
                                    <div className="absolute left-4 top-4 pointer-events-none text-gray-500">
                                        <svg className="w-5 h-5 fill-current" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 relative z-10">
                        {/* Status bar */}
                        <div className="flex flex-col sm:flex-row justify-between items-center mb-8 px-2 gap-3">
                            <span className="text-gray-600 font-semibold text-sm bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200">
                                נמצאו <span className="text-primary font-bold text-base">{filteredData.length}</span> תוצאות
                            </span>
                            
                            {(searchQuery || selectedCategory !== "הכל") && (
                                <button 
                                    onClick={() => {setSearchQuery(""); setSelectedCategory("הכל");}}
                                    className="text-primary hover:text-primaryDark flex items-center gap-2 transition-colors px-4 py-2 rounded-lg hover:bg-primaryLight font-bold text-sm focus:ring-2 focus:ring-primary focus:outline-none"
                                >
                                    <X className="w-4 h-4" />
                                    נקה סינון
                                </button>
                            )}
                        </div>

                        {filteredData.length === 0 ? (
                            <div className="text-center py-24 bg-white rounded-3xl shadow-sm border border-gray-200 mx-auto max-w-lg mt-8">
                                <div className="text-gray-200 mb-6 flex justify-center"><SearchIcon className="w-20 h-20" /></div>
                                <h3 className="text-2xl font-bold text-gray-800 mb-3">לא נמצאו תוצאות</h3>
                                <p className="text-gray-500 text-base px-6">נסה לשנות את מילות החיפוש או לבחור קטגוריה אחרת מתפריט הסינון.</p>
                                <button 
                                    onClick={() => {setSearchQuery(""); setSelectedCategory("הכל");}}
                                    className="mt-8 text-primary font-bold hover:underline px-6 py-2 rounded-full bg-primaryLight/50"
                                >
                                    חזור לכל הפרויקטים
                                </button>
                            </div>
                        ) : (
                            /* גריד הכרטיסיות מוקטן, צפוף וקומפקטי יותר */
                            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-4">
                                {filteredData.map((item, index) => (
                                    <div key={index} className="group bg-white rounded-2xl flex flex-col justify-between h-full border border-gray-100 shadow-sm hover:shadow-hover hover:-translate-y-1 transition-all duration-300 relative overflow-hidden">
                                        
                                        {/* אזור התמונה - יחס 16:9 למניעת שטח מת בגניאלי */}
                                        <div className="relative w-full aspect-video overflow-hidden image-skeleton">
                                            {/* שכבת כהות עדינה למטה להבלטת הטקסט */}
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent z-10 pointer-events-none"></div>
                                            
                                            <img 
                                                src={item.image || getApiScreenshotImage(item.url)} 
                                                onError={(e) => { 
                                                    e.target.onerror = null; 
                                                    e.target.src = getDefaultImage(item.category); 
                                                }}
                                                alt={`תמונה של ${item.title}`}
                                                className="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-110 relative z-0"
                                                loading="lazy"
                                            />
                                            
                                            {/* תגית קטגוריה על גבי התמונה - מוקטנת */}
                                            <div className="absolute top-2 right-2 z-20">
                                                <span className={`glass-badge inline-flex items-center px-2 py-1 text-[10px] font-bold rounded-full shadow-sm tracking-wide ${getCategoryBadgeStyle(item.category)}`}>
                                                    {item.category}
                                                </span>
                                            </div>
                                        </div>
                                        
                                        {/* אזור התוכן - ריווחים ופונטים מוקטנים */}
                                        <div className="p-4 flex flex-col flex-1 bg-white relative z-20">
                                            <h3 className="text-sm md:text-base font-extrabold text-gray-900 leading-snug mb-3 flex-1 group-hover:text-primary transition-colors line-clamp-2" title={item.title}>
                                                {item.title}
                                            </h3>
                                            
                                            {/* כפתורי פעולה מוקטנים */}
                                            <div className="mt-auto pt-3 border-t border-gray-100 flex gap-2 items-center">
                                                <a 
                                                    href={item.url} 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="flex-1 bg-gray-50 hover:bg-primary text-gray-800 hover:text-white py-1.5 px-3 rounded-xl font-bold text-xs text-center transition-all duration-300 flex items-center justify-center gap-1 group/btn border border-gray-200 hover:border-transparent focus:outline-none shadow-sm"
                                                    aria-label={`פתח את הפרויקט ${item.title}`}
                                                >
                                                    לפרויקט
                                                    <ExternalLink className="w-3.5 h-3.5 opacity-70 group-hover/btn:opacity-100 group-hover/btn:-translate-x-1 transition-transform" />
                                                </a>
                                                
                                                <button 
                                                    onClick={() => handleCopy(item.url, index)}
                                                    className={`p-2 rounded-xl border transition-all duration-200 focus:outline-none shadow-sm ${
                                                        copiedIndex === index 
                                                        ? 'bg-green-50 border-green-300 text-green-700' 
                                                        : 'bg-white border-gray-200 text-gray-500 hover:text-primary'
                                                    }`}
                                                    title="העתק קישור"
                                                >
                                                    {copiedIndex === index ? <Check className="w-4 h-4" /> : <Copy className="w-4 h-4" />}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    
                    <footer className="mt-20 text-center text-gray-400 text-sm pb-10 font-medium">
                        <p>© {new Date().getFullYear()} קטלוג תוצרים דיגיטליים</p>
                    </footer>
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
